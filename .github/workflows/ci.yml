name: CI

# "on" määrittää milloin tämä workflow käynnistyy automaattisesti:
# - aina kun pushaat main-haaraan
# - aina kun avaat tai päivität pull requestin (mitä tahansa haaraa vasten)
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # build-and-test kääntää koodin ja ajaa testit - tämä on perus-CI:n
  # ydin, jonka pitäisi aina olla vihreä ennen kuin koodia mergetään.
  build-and-test:
    runs-on: ubuntu-latest

    # defaults/working-directory tarkoittaa, että kaikki tämän jobin
    # "run"-komennot ajetaan automaattisesti agent/-kansiossa, ilman
    # että joutuu kirjoittamaan "cd agent &&" joka komentoon erikseen.
    defaults:
      run:
        working-directory: agent

    steps:
      # checkout hakee repon sisällön GitHub Actionsin omalle koneelle -
      # ilman tätä askelta workflow ei näkisi yhtään tiedostoa.
      - uses: actions/checkout@v4

      # setup-go asentaa Go:n täsmälleen siihen versioon jota projekti
      # käyttää - sama versio kuin go.mod:issa.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # go build kääntää koodin - jos jossain on syntaksivirhe tai
      # puuttuva riippuvuus, tämä epäonnistuu ja koko workflow näytetään
      # punaisena GitHubissa.
      - name: Build
        run: go build -v ./...

      # go test ajaa kaikki _test.go-tiedostot. -v näyttää yksittäisten
      # testien nimet lokissa, helpottaa virheen paikantamista.
      - name: Test
        run: go test -v ./...

      # go vet etsii epäilyttäviä koodirakenteita jotka kääntyvät kyllä,
      # mutta ovat todennäköisesti virheitä (esim. väärä Printf-formaatti).
      - name: Vet
        run: go vet ./...

  # sast-job ajaa CodeQL:n - GitHubin omistaman, ilmaisen staattisen
  # analyysityökalun joka skannaa koodin tunnettujen haavoittuvuus-
  # mallien varalta (esim. SQL-injektiot, kovakoodatut salaisuudet,
  # puuttuva input-validointi). Tämä on erillinen job samassa
  # tiedostossa - ajetaan rinnakkain build-and-test-jobin kanssa.
  sast:
    runs-on: ubuntu-latest

    # permissions/security-events on PAKOLLINEN CodeQL:lle - se kertoo
    # GitHubille että tämä workflow saa kirjoittaa löydökset Security-
    # välilehdelle. Oletuksena workflow-tokenilla EI ole tätä oikeutta,
    # niin tämä rivi täytyy lisätä erikseen.
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      # init valmistelee CodeQL-analyysin valitulle kielelle (go).
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      # autobuild yrittää kääntää koodin automaattisesti - CodeQL
      # tarvitsee onnistuneen käännöksen nähdäkseen koodin rakenteen
      # tarkasti, ei vain lukea tiedostoja tekstina.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # analyze ajaa varsinaisen skannauksen ja lähettää tulokset
      # GitHubin Security-välilehdelle.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3